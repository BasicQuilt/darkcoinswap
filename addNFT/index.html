<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />

<title>Dungeon of Champions — Add NFT Prize</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

<script>var global = window;</script>
<script src="vendor/vendor-bundle.js"></script>

<style>
:root{
  --bg:#090b10;
  --panel:#11151d;
  --panel2:#171c26;
  --border:#262e3f;
  --text:#eef2ff;
  --muted:#8f9bb7;

  --gold:#d9aa39;
  --gold2:#f3cb69;

  --green:#2ecc71;
  --red:#ff6b6b;

  --shadow:0 24px 80px rgba(0,0,0,.45);
}

*{
  box-sizing:border-box;
  margin:0;
  padding:0;
}

body{
  min-height:100vh;
  background:
    radial-gradient(circle at top right, rgba(217,170,57,.12), transparent 28%),
    radial-gradient(circle at bottom left, rgba(255,255,255,.03), transparent 24%),
    var(--bg);

  color:var(--text);
  font-family:'Inter',sans-serif;

  display:flex;
  align-items:center;
  justify-content:center;

  padding:24px;
}

body::before{
  content:'';
  position:fixed;
  inset:0;
  background-image:
    linear-gradient(rgba(255,255,255,.02) 1px, transparent 1px),
    linear-gradient(90deg, rgba(255,255,255,.02) 1px, transparent 1px);

  background-size:38px 38px;
  pointer-events:none;
}

.wrap{
  width:100%;
  max-width:560px;
  position:relative;
  z-index:1;
}

.card{
  background:linear-gradient(
    180deg,
    rgba(255,255,255,.03),
    rgba(255,255,255,.01)
  );

  border:1px solid var(--border);
  border-radius:24px;

  overflow:hidden;

  backdrop-filter:blur(14px);

  box-shadow:var(--shadow);
}

.hero{
  padding:36px 32px 28px;
  border-bottom:1px solid rgba(255,255,255,.06);

  background:
    linear-gradient(
      135deg,
      rgba(217,170,57,.14),
      rgba(217,170,57,.04)
    );
}

.hero-icon{
  width:72px;
  height:72px;

  border-radius:20px;

  display:flex;
  align-items:center;
  justify-content:center;

  font-size:34px;

  background:rgba(217,170,57,.12);
  border:1px solid rgba(217,170,57,.25);

  margin-bottom:18px;
}

.hero h1{
  font-family:'Cinzel',serif;
  font-size:30px;
  line-height:1.2;
  color:var(--gold2);
}

.hero p{
  margin-top:10px;
  color:var(--muted);
  line-height:1.6;
  font-size:15px;
}

.content{
  padding:28px 32px 32px;
}

.status{
  display:none;

  padding:14px 16px;
  border-radius:16px;

  margin-bottom:20px;

  font-size:14px;
  line-height:1.6;
}

.status.show{
  display:block;
}

.status.info{
  background:rgba(90,140,255,.10);
  border:1px solid rgba(90,140,255,.25);
  color:#b7caff;
}

.status.success{
  background:rgba(46,204,113,.10);
  border:1px solid rgba(46,204,113,.25);
  color:#9af0bf;
}

.status.error{
  background:rgba(255,107,107,.10);
  border:1px solid rgba(255,107,107,.25);
  color:#ffbcbc;
}

.status.loading{
  background:rgba(217,170,57,.10);
  border:1px solid rgba(217,170,57,.25);
  color:#f7d988;
}

.grid{
  display:grid;
  gap:14px;
  margin-bottom:26px;
}

.info{
  background:var(--panel);
  border:1px solid var(--border);
  border-radius:18px;
  padding:16px;
}

.label{
  font-size:11px;
  letter-spacing:.12em;
  text-transform:uppercase;
  color:var(--muted);
  margin-bottom:8px;
  font-weight:700;
}

.value{
  color:var(--text);
  word-break:break-word;
  line-height:1.5;
}

.value.name{
  font-size:20px;
  font-weight:700;
  color:var(--gold2);
}

.wallet{
  display:none;

  align-items:center;
  gap:10px;

  background:rgba(46,204,113,.08);
  border:1px solid rgba(46,204,113,.2);

  padding:12px 16px;
  border-radius:16px;

  margin-bottom:22px;
}

.wallet.show{
  display:flex;
}

.wallet-dot{
  width:10px;
  height:10px;
  border-radius:50%;
  background:var(--green);
}

.wallet span{
  color:#bff7d2;
  font-size:14px;
}

.wallet-buttons{
  display:flex;
  gap:12px;
  margin-bottom:14px;
}

.btn{
  border:none;
  outline:none;

  cursor:pointer;

  transition:.2s ease;

  border-radius:18px;

  font-weight:700;
  font-size:15px;

  padding:16px 18px;
}

.btn:disabled{
  opacity:.45;
  cursor:not-allowed;
}

.btn-wallet{
  flex:1;

  background:var(--panel2);
  color:var(--text);

  border:1px solid var(--border);
}

.btn-wallet:hover:not(:disabled){
  transform:translateY(-1px);
  border-color:rgba(217,170,57,.35);
}

.btn-wallet.active{
  border-color:rgba(46,204,113,.4);
  color:#bff7d2;
  background:rgba(46,204,113,.08);
}

.btn-send{
  width:100%;

  background:linear-gradient(
    135deg,
    #b7861f,
    #e0ba5c
  );

  color:#1d1405;

  box-shadow:
    0 10px 32px rgba(217,170,57,.24);

  margin-top:10px;
}

.btn-send:hover:not(:disabled){
  transform:translateY(-1px);
}

.btn-send.success{
  background:linear-gradient(
    135deg,
    #1f8f52,
    #38d67a
  );

  color:white;
}

.tx-link{
  display:none;
  margin-top:18px;

  text-align:center;
  color:var(--gold2);

  text-decoration:none;
  font-weight:600;
}

.tx-link:hover{
  text-decoration:underline;
}

.footer{
  margin-top:20px;
  text-align:center;
  color:rgba(255,255,255,.35);
  font-size:13px;
}

.spinner{
  width:14px;
  height:14px;
  border-radius:50%;

  border:2px solid rgba(255,255,255,.2);
  border-top-color:currentColor;

  display:inline-block;

  animation:spin .7s linear infinite;

  margin-right:8px;
  vertical-align:-2px;
}

@keyframes spin{
  to{
    transform:rotate(360deg);
  }
}
</style>
</head>

<body>

<div class="wrap">

  <div class="card">

    <div class="hero">
      <div class="hero-icon">🏆</div>

      <h1>Add NFT Prize</h1>

      <p>
        Transfer your NFT into the Dungeon of Champions prize pool.
        Connect your wallet and sign the transaction below.
      </p>
    </div>

    <div class="content">

      <div class="status loading show" id="status">
        <span id="status-text">
          <span class="spinner"></span>
          Loading prize data...
        </span>
      </div>

      <div class="wallet" id="wallet-badge">
        <div class="wallet-dot"></div>
        <span id="wallet-addr">Wallet Connected</span>
      </div>

      <div class="grid" id="info-grid"></div>

      <div class="wallet-buttons">
        <button class="btn btn-wallet" id="btn-pera" disabled>
          🔵 Pera
        </button>

        <button class="btn btn-wallet" id="btn-defly" disabled>
          🟢 Defly
        </button>
      </div>

      <button class="btn btn-send" id="btn-send" disabled>
        Connect Wallet First
      </button>

      <a
        href="#"
        class="tx-link"
        id="tx-link"
        target="_blank"
        rel="noopener"
      >
        View Transaction ↗
      </a>

    </div>

  </div>

  <div class="footer">
    Powered by Algorand • Dungeon of Champions
  </div>

</div>

<script>
'use strict';

// ── Wallet resolution ────────────────────────────────────────────────────
function resolveConstructor(candidates) {
  for (let i = 0; i < candidates.length; i++) {

    const parts = candidates[i].split('.');
    let obj = window;

    for (let j = 0; j < parts.length; j++) {

      if (obj == null) {
        obj = null;
        break;
      }

      obj = obj[parts[j]];
    }

    if (typeof obj === 'function') {
      return obj;
    }
  }

  return null;
}

const PeraWalletConnect = resolveConstructor([
  'peraWalletConnect.PeraWalletConnect',
  'PeraWalletConnect'
]);

const DeflyWalletConnect = resolveConstructor([
  'deflyWalletConnect.DeflyWalletConnect',
  'DeflyWalletConnect'
]);

// ── Wallet instances ─────────────────────────────────────────────────────
const peraWallet =
  PeraWalletConnect ? new PeraWalletConnect() : null;

const deflyWallet =
  DeflyWalletConnect ? new DeflyWalletConnect() : null;

// ── Algod ────────────────────────────────────────────────────────────────
const algodClient =
  new algosdk.Algodv2(
    '',
    'https://mainnet-api.algonode.cloud',
    443
  );

// ── UI refs ──────────────────────────────────────────────────────────────
const $status      = document.getElementById('status');
const $statusText  = document.getElementById('status-text');

const $walletBadge = document.getElementById('wallet-badge');
const $walletAddr  = document.getElementById('wallet-addr');

const $btnPera     = document.getElementById('btn-pera');
const $btnDefly    = document.getElementById('btn-defly');

const $btnSend     = document.getElementById('btn-send');

const $txLink      = document.getElementById('tx-link');

const $grid        = document.getElementById('info-grid');

// ── State ────────────────────────────────────────────────────────────────
let gistData       = null;
let connectedAddr  = null;
let activeWallet   = null;
let walletType     = null;

// ── Helpers ──────────────────────────────────────────────────────────────
function setStatus(type, msg) {

  $status.className = `status show ${type}`;

  $statusText.innerHTML = msg;
}

function shortAddr(addr) {
  return addr.slice(0, 8) + '…' + addr.slice(-6);
}

function escHtml(str) {
  return String(str)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;');
}

function renderData() {

  $grid.innerHTML = `
    <div class="info">
      <div class="label">NFT Name</div>
      <div class="value name">${escHtml(gistData.assetName)}</div>
    </div>

    <div class="info">
      <div class="label">Asset ID</div>
      <div class="value">${escHtml(gistData.assetId)}</div>
    </div>

    <div class="info">
      <div class="label">Prize Wallet</div>
      <div class="value">${escHtml(gistData.receiverAddress)}</div>
    </div>

    <div class="info">
      <div class="label">Transaction Note</div>
      <div class="value">${escHtml(gistData.note)}</div>
    </div>
  `;
}

// ── Load gist ────────────────────────────────────────────────────────────
async function loadGist() {

  const gistId =
    new URLSearchParams(window.location.search)
      .get('gist');

  if (!gistId) {

    setStatus(
      'error',
      '❌ No signing link found.'
    );

    return;
  }

  try {

    const res = await fetch(
      `https://api.github.com/gists/${gistId}`,
      {
        headers: {
          Accept: 'application/vnd.github+json'
        }
      }
    );

    if (!res.ok) {
      throw new Error('Link expired or invalid.');
    }

    const json = await res.json();

    const content =
      json.files?.['prize-add-data.json']?.content;

    if (!content) {
      throw new Error('Prize data missing.');
    }

    gistData = JSON.parse(content);

    renderData();

    setStatus(
      'info',
      '🔗 Connect your wallet to continue.'
    );

    $btnPera.disabled  = false;
    $btnDefly.disabled = false;

  } catch (err) {

    setStatus(
      'error',
      `❌ ${err.message}`
    );
  }
}

// ── Connect wallet ───────────────────────────────────────────────────────
async function connectWallet(type) {

  try {

    walletType =
      type;

    activeWallet =
      type === 'pera'
        ? peraWallet
        : deflyWallet;

    if (!activeWallet) {
      throw new Error(
        `${type} wallet failed to initialize.`
      );
    }

    setStatus(
      'loading',
      '<span class="spinner"></span> Waiting for wallet connection...'
    );

    let accounts = [];

    try {
      accounts =
        await activeWallet.reconnectSession();
    } catch {}

    if (!accounts || accounts.length === 0) {
      accounts =
        await activeWallet.connect();
    }

    connectedAddr =
      accounts[0];

    $walletAddr.textContent =
      shortAddr(connectedAddr);

    $walletBadge.classList.add('show');

    $btnPera.classList.remove('active');
    $btnDefly.classList.remove('active');

    document
      .getElementById(
        type === 'pera'
          ? 'btn-pera'
          : 'btn-defly'
      )
      .classList.add('active');

    setStatus(
      'success',
      `✅ Connected with ${
        type === 'pera'
          ? 'Pera'
          : 'Defly'
      }`
    );

    $btnSend.disabled = false;

    $btnSend.textContent =
      `Send NFT with ${
        type === 'pera'
          ? 'Pera'
          : 'Defly'
      }`;

  } catch (err) {

    setStatus(
      'error',
      `❌ ${err.message || 'Wallet connection failed.'}`
    );
  }
}

// ── Send NFT ─────────────────────────────────────────────────────────────
async function sendNFT() {

  if (
    !gistData ||
    !connectedAddr ||
    !activeWallet
  ) {
    return;
  }

  try {

    $btnSend.disabled = true;

    setStatus(
      'loading',
      '<span class="spinner"></span> Building transaction...'
    );

    const suggestedParams =
      await algodClient
        .getTransactionParams()
        .do();

    const noteBytes =
      new TextEncoder()
        .encode(gistData.note);

    const txn =
      algosdk.makeAssetTransferTxnWithSuggestedParams(
        connectedAddr,
        gistData.receiverAddress,
        undefined,
        undefined,
        1,
        noteBytes,
        gistData.assetId,
        suggestedParams
      );

    const txnGroup = [
      {
        txn,
        signers:[connectedAddr]
      }
    ];

    setStatus(
      'loading',
      '<span class="spinner"></span> Waiting for signature...'
    );

    const signedTxns =
      await activeWallet
        .signTransaction([txnGroup]);

    setStatus(
      'loading',
      '<span class="spinner"></span> Submitting transaction...'
    );

    const { txId } =
      await algodClient
        .sendRawTransaction(signedTxns)
        .do();

    await algosdk.waitForConfirmation(
      algodClient,
      txId,
      4
    );

    setStatus(
      'success',
      `✅ NFT successfully added to the prize pool.<br><br>
       TX ID:<br><code>${txId}</code>`
    );

    $txLink.href =
      `https://allo.info/tx/${txId}`;

    $txLink.style.display = 'block';

    $btnSend.classList.add('success');

    $btnSend.textContent =
      'NFT Sent Successfully';

  } catch (err) {

    $btnSend.disabled = false;

    if (
      err?.message?.includes('cancelled') ||
      err?.message?.includes('rejected')
    ) {

      setStatus(
        'error',
        '❌ Transaction cancelled.'
      );

    } else {

      setStatus(
        'error',
        `❌ ${err.message || 'Transaction failed.'}`
      );
    }
  }
}

// ── Events ───────────────────────────────────────────────────────────────
$btnPera.addEventListener(
  'click',
  () => connectWallet('pera')
);

$btnDefly.addEventListener(
  'click',
  () => connectWallet('defly')
);

$btnSend.addEventListener(
  'click',
  sendNFT
);

// ── Start ────────────────────────────────────────────────────────────────
loadGist();
</script>

</body>
</html>
