<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Add NFT Prize — Dungeon of Champions</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600;900&family=Crimson+Pro:ital,wght@0,300;0,400;1,300&display=swap" rel="stylesheet" />

<style>
  :root {
    --blood:    #8B0000;
    --ember:    #C0392B;
    --gold:     #D4A017;
    --gold-lt:  #F0C040;
    --stone:    #1a1410;
    --stone-lt: #2a201a;
    --stone-md: #362820;
    --ash:      #b8a898;
    --white:    #f0ebe4;
    --success:  #2ecc71;
    --error:    #e74c3c;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    height: 100%;
    background: var(--stone);
    color: var(--white);
    font-family: 'Crimson Pro', Georgia, serif;
    font-size: 18px;
    line-height: 1.6;
  }

  /* ── Texture overlay ── */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background:
      repeating-linear-gradient(
        0deg,
        transparent,
        transparent 2px,
        rgba(0,0,0,.08) 2px,
        rgba(0,0,0,.08) 4px
      );
    pointer-events: none;
    z-index: 0;
  }

  /* ── Ember glow in corner ── */
  body::after {
    content: '';
    position: fixed;
    bottom: -120px;
    right: -120px;
    width: 480px;
    height: 480px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(139,0,0,.25) 0%, transparent 70%);
    pointer-events: none;
    z-index: 0;
  }

  .wrap {
    position: relative;
    z-index: 1;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 2rem 1rem;
  }

  /* ── Card ── */
  .card {
    width: 100%;
    max-width: 520px;
    background: var(--stone-lt);
    border: 1px solid rgba(212,160,23,.25);
    border-radius: 4px;
    box-shadow:
      0 0 0 1px rgba(0,0,0,.5),
      0 24px 64px rgba(0,0,0,.7),
      inset 0 1px 0 rgba(212,160,23,.12);
    overflow: hidden;
    animation: rise .5s cubic-bezier(.22,1,.36,1) both;
  }

  @keyframes rise {
    from { opacity: 0; transform: translateY(20px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* ── Card header ── */
  .card-head {
    background: linear-gradient(135deg, var(--blood) 0%, #3d0000 100%);
    padding: 2rem 2.5rem 1.75rem;
    border-bottom: 1px solid rgba(212,160,23,.3);
    position: relative;
    overflow: hidden;
  }

  .card-head::after {
    content: '⚔';
    position: absolute;
    right: 1.5rem;
    top: 50%;
    transform: translateY(-50%);
    font-size: 4rem;
    opacity: .08;
    line-height: 1;
  }

  .card-head h1 {
    font-family: 'Cinzel', serif;
    font-size: 1.1rem;
    font-weight: 600;
    letter-spacing: .12em;
    text-transform: uppercase;
    color: var(--gold);
    margin-bottom: .25rem;
  }

  .card-head p {
    font-size: .9rem;
    color: rgba(240,235,228,.55);
    font-style: italic;
  }

  /* ── Card body ── */
  .card-body {
    padding: 2rem 2.5rem;
  }

  /* ── Info rows ── */
  .info-grid {
    display: grid;
    gap: .75rem;
    margin-bottom: 2rem;
  }

  .info-row {
    display: flex;
    flex-direction: column;
    gap: .15rem;
  }

  .info-label {
    font-family: 'Cinzel', serif;
    font-size: .65rem;
    letter-spacing: .15em;
    text-transform: uppercase;
    color: var(--gold);
    opacity: .7;
  }

  .info-value {
    font-size: .95rem;
    color: var(--white);
    word-break: break-all;
    background: rgba(0,0,0,.25);
    border: 1px solid rgba(255,255,255,.07);
    border-radius: 3px;
    padding: .4rem .7rem;
    font-family: 'Courier New', monospace;
    font-size: .82rem;
    letter-spacing: .02em;
  }

  .info-value.name {
    font-family: 'Crimson Pro', serif;
    font-size: 1.05rem;
    letter-spacing: 0;
  }

  /* ── Divider ── */
  .divider {
    border: none;
    border-top: 1px solid rgba(212,160,23,.15);
    margin: 1.5rem 0;
  }

  /* ── Buttons ── */
  .btn {
    width: 100%;
    padding: .85rem 1.5rem;
    border: none;
    border-radius: 3px;
    font-family: 'Cinzel', serif;
    font-size: .85rem;
    font-weight: 600;
    letter-spacing: .1em;
    text-transform: uppercase;
    cursor: pointer;
    transition: all .2s;
    position: relative;
    overflow: hidden;
  }

  .btn:disabled {
    opacity: .4;
    cursor: not-allowed;
  }

  .btn-primary {
    background: linear-gradient(135deg, var(--blood) 0%, #6b0000 100%);
    color: var(--gold-lt);
    border: 1px solid rgba(212,160,23,.4);
    box-shadow: 0 4px 16px rgba(139,0,0,.4);
  }

  .btn-primary:not(:disabled):hover {
    background: linear-gradient(135deg, var(--ember) 0%, var(--blood) 100%);
    box-shadow: 0 6px 24px rgba(139,0,0,.6);
    transform: translateY(-1px);
  }

  .btn-primary:not(:disabled):active {
    transform: translateY(0);
  }

  .btn-success {
    background: linear-gradient(135deg, #1a5c35 0%, #0d3d22 100%);
    color: #a8ffc4;
    border: 1px solid rgba(46,204,113,.3);
    box-shadow: 0 4px 16px rgba(46,204,113,.2);
  }

  .btn-success:not(:disabled):hover {
    box-shadow: 0 6px 24px rgba(46,204,113,.35);
    transform: translateY(-1px);
  }

  .btn + .btn { margin-top: .75rem; }

  /* ── Status banner ── */
  .status {
    padding: .85rem 1rem;
    border-radius: 3px;
    font-size: .9rem;
    margin-bottom: 1.25rem;
    display: none;
    align-items: flex-start;
    gap: .6rem;
    line-height: 1.4;
  }

  .status.show    { display: flex; }
  .status.info    { background: rgba(44,62,80,.6);  border: 1px solid rgba(100,149,237,.3); color: #a0c4ff; }
  .status.success { background: rgba(27,94,53,.5);  border: 1px solid rgba(46,204,113,.4);  color: #a8ffc4; }
  .status.error   { background: rgba(94,27,27,.5);  border: 1px solid rgba(231,76,60,.4);   color: #ffb3b3; }
  .status.loading { background: rgba(44,32,16,.6);  border: 1px solid rgba(212,160,23,.3);  color: var(--ash); }

  .status-icon { flex-shrink: 0; font-size: 1rem; margin-top: .05rem; }

  /* ── Connected wallet badge ── */
  .wallet-badge {
    display: none;
    align-items: center;
    gap: .5rem;
    background: rgba(0,0,0,.3);
    border: 1px solid rgba(212,160,23,.2);
    border-radius: 3px;
    padding: .4rem .75rem;
    font-size: .75rem;
    color: var(--ash);
    margin-bottom: 1.25rem;
    word-break: break-all;
  }

  .wallet-badge.show { display: flex; }
  .wallet-badge-dot  { width: 7px; height: 7px; border-radius: 50%; background: var(--success); flex-shrink: 0; }

  /* ── TX hash link ── */
  .tx-link {
    display: block;
    text-align: center;
    color: var(--gold);
    font-size: .85rem;
    margin-top: 1rem;
    text-decoration: none;
    opacity: .8;
  }

  .tx-link:hover { opacity: 1; text-decoration: underline; }

  /* ── Spinner ── */
  @keyframes spin { to { transform: rotate(360deg); } }
  .spinner {
    display: inline-block;
    width: 14px;
    height: 14px;
    border: 2px solid rgba(255,255,255,.2);
    border-top-color: var(--gold);
    border-radius: 50%;
    animation: spin .7s linear infinite;
    vertical-align: middle;
    margin-right: .4rem;
  }

  /* ── Footer ── */
  .footer {
    margin-top: 2rem;
    font-size: .75rem;
    color: rgba(184,168,152,.35);
    text-align: center;
    font-style: italic;
  }

  /* ── Loading skeleton ── */
  .skeleton {
    background: linear-gradient(90deg, var(--stone-md) 25%, var(--stone-lt) 50%, var(--stone-md) 75%);
    background-size: 200% 100%;
    animation: shimmer 1.4s infinite;
    border-radius: 3px;
    height: 2.2rem;
  }

  @keyframes shimmer {
    from { background-position: 200% 0; }
    to   { background-position: -200% 0; }
  }
</style>
</head>
<body>
<div class="wrap">
  <div class="card">
    <div class="card-head">
      <h1>Add NFT Prize</h1>
      <p>Dungeon of Champions — Prize Pool</p>
    </div>

    <div class="card-body">

      <!-- Status banner -->
      <div class="status loading show" id="status">
        <span class="status-icon">⏳</span>
        <span id="status-text">Loading prize data…</span>
      </div>

      <!-- Connected wallet -->
      <div class="wallet-badge" id="wallet-badge">
        <span class="wallet-badge-dot"></span>
        <span id="wallet-addr">—</span>
      </div>

      <!-- Info grid (populated by JS) -->
      <div class="info-grid" id="info-grid">
        <div class="info-row">
          <span class="info-label">NFT Name</span>
          <div class="skeleton" id="sk-name"></div>
        </div>
        <div class="info-row">
          <span class="info-label">Asset ID</span>
          <div class="skeleton" id="sk-id"></div>
        </div>
        <div class="info-row">
          <span class="info-label">Send To</span>
          <div class="skeleton" id="sk-addr"></div>
        </div>
        <div class="info-row">
          <span class="info-label">Transaction Note</span>
          <div class="skeleton" id="sk-note"></div>
        </div>
      </div>

      <hr class="divider" />

      <!-- Action buttons -->
      <button class="btn btn-primary" id="btn-connect" disabled>
        Connect Pera / Defly Wallet
      </button>

      <button class="btn btn-success" id="btn-send" disabled style="display:none">
        Sign &amp; Send NFT
      </button>

      <!-- TX link shown after success -->
      <a href="#" class="tx-link" id="tx-link" style="display:none" target="_blank" rel="noopener">
        View transaction on Allo ↗
      </a>

    </div><!-- /card-body -->
  </div><!-- /card -->

  <p class="footer">Powered by Algorand · Pera Wallet · Dungeon of Champions</p>
</div>

<!-- ── Dependencies ─────────────────────────────────────────────────────── -->
<!-- algosdk -->
<script src="https://cdn.jsdelivr.net/npm/algosdk@2.8.0/dist/browser/algosdk.min.js"></script>
<!-- PeraWallet Connect -->
<script src="https://cdn.jsdelivr.net/npm/@perawallet/connect@1.3.4/dist/index.umd.min.js"></script>

<script>
'use strict';

// ── Algorand mainnet node (public AlgoNode) ──────────────────────────────
const ALGOD_SERVER  = 'https://mainnet-api.algonode.cloud';
const ALGOD_PORT    = 443;
const ALGOD_TOKEN   = '';
const algodClient   = new algosdk.Algodv2(ALGOD_TOKEN, ALGOD_SERVER, ALGOD_PORT);

// ── UI refs ───────────────────────────────────────────────────────────────
const $status     = document.getElementById('status');
const $statusText = document.getElementById('status-text');
const $badge      = document.getElementById('wallet-badge');
const $badgeAddr  = document.getElementById('wallet-addr');
const $btnConnect = document.getElementById('btn-connect');
const $btnSend    = document.getElementById('btn-send');
const $txLink     = document.getElementById('tx-link');

// ── State ─────────────────────────────────────────────────────────────────
let gistData       = null;
let connectedAddr  = null;
let peraWallet     = null;

// ── Helpers ───────────────────────────────────────────────────────────────
function setStatus(type, icon, msg) {
  $status.className = `status show ${type}`;
  $statusText.innerHTML = msg;
  $status.querySelector('.status-icon').textContent = icon;
}

function replaceSkeletons(name, assetId, receiver, note) {
  const grid = document.getElementById('info-grid');
  grid.innerHTML = `
    <div class="info-row">
      <span class="info-label">NFT Name</span>
      <span class="info-value name">${escHtml(name)}</span>
    </div>
    <div class="info-row">
      <span class="info-label">Asset ID</span>
      <span class="info-value">${escHtml(String(assetId))}</span>
    </div>
    <div class="info-row">
      <span class="info-label">Send To (Prize Wallet)</span>
      <span class="info-value">${escHtml(receiver)}</span>
    </div>
    <div class="info-row">
      <span class="info-label">Transaction Note</span>
      <span class="info-value">${escHtml(note)}</span>
    </div>
  `;
}

function escHtml(str) {
  return String(str)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;');
}

function shortAddr(addr) {
  return addr.slice(0, 8) + '…' + addr.slice(-6);
}

// ── 1. Read gist ID from URL ───────────────────────────────────────────────
const gistId = new URLSearchParams(window.location.search).get('gist');

if (!gistId) {
  setStatus('error', '❌', 'No gist ID found in the URL. Please use the link provided by the bot.');
} else {
  loadGist(gistId);
}

// ── 2. Fetch gist data ────────────────────────────────────────────────────
async function loadGist(id) {
  try {
    const res = await fetch(`https://api.github.com/gists/${id}`, {
      headers: { Accept: 'application/vnd.github+json' },
    });

    if (!res.ok) {
      const msg = res.status === 404
        ? 'Signing link not found or expired. Ask an admin to run <code>/dungeon_prize add</code> again.'
        : `GitHub returned status ${res.status}.`;
      return setStatus('error', '❌', msg);
    }

    const json    = await res.json();
    const content = json.files?.['prize-add-data.json']?.content;

    if (!content) {
      return setStatus('error', '❌', 'Gist data is missing or malformed.');
    }

    gistData = JSON.parse(content);

    // Validate it's the right type
    if (gistData.type !== 'nft_add') {
      return setStatus('error', '❌', 'This link is not for an NFT prize addition.');
    }

    replaceSkeletons(gistData.assetName, gistData.assetId, gistData.receiverAddress, gistData.note);
    setStatus('info', '🔗', 'Connect your wallet to sign the transfer.');
    $btnConnect.disabled = false;

  } catch (err) {
    setStatus('error', '❌', `Failed to load signing data: ${err.message}`);
  }
}

// ── 3. Connect wallet ─────────────────────────────────────────────────────
$btnConnect.addEventListener('click', async () => {
  try {
    setStatus('loading', '⏳', '<span class="spinner"></span>Waiting for wallet connection…');
    $btnConnect.disabled = true;

    // Initialise PeraWallet
    peraWallet = new PeraWalletConnect.PeraWalletConnect();

    // Try to reconnect any existing session first
    let accounts = [];
    try {
      accounts = await peraWallet.reconnectSession();
    } catch {
      // No existing session — that's fine
    }

    if (!accounts || accounts.length === 0) {
      accounts = await peraWallet.connect();
    }

    connectedAddr = accounts[0];
    $badgeAddr.textContent = shortAddr(connectedAddr);
    $badge.classList.add('show');

    setStatus('success', '✅', `Wallet connected: <strong>${shortAddr(connectedAddr)}</strong>`);
    $btnConnect.style.display = 'none';
    $btnSend.style.display    = 'block';
    $btnSend.disabled         = false;

    // Handle wallet disconnect
    peraWallet.connector?.on('disconnect', () => {
      connectedAddr = null;
      $badge.classList.remove('show');
      $btnSend.style.display    = 'none';
      $btnConnect.style.display = 'block';
      $btnConnect.disabled      = false;
      setStatus('info', '🔗', 'Wallet disconnected. Reconnect to continue.');
    });

  } catch (err) {
    $btnConnect.disabled = false;
    if (err?.message?.includes('cancelled') || err?.message?.includes('closed')) {
      setStatus('info', '🔗', 'Connection cancelled. Click to try again.');
    } else {
      setStatus('error', '❌', `Connection failed: ${err.message}`);
    }
  }
});

// ── 4. Build + sign + send transaction ───────────────────────────────────
$btnSend.addEventListener('click', async () => {
  if (!connectedAddr || !gistData) return;

  $btnSend.disabled = true;
  setStatus('loading', '⏳', '<span class="spinner"></span>Building transaction…');

  try {
    const suggestedParams = await algodClient.getTransactionParams().do();

    // Encode the note string as bytes
    const noteBytes = new TextEncoder().encode(gistData.note);

    const txn = algosdk.makeAssetTransferTxnWithSuggestedParamsFromObject({
      from:            connectedAddr,
      to:              gistData.receiverAddress,
      amount:          1,
      assetIndex:      gistData.assetId,
      note:            noteBytes,
      suggestedParams,
    });

    setStatus('loading', '⏳', '<span class="spinner"></span>Waiting for wallet signature…');

    // Sign via Pera
    const signedTxns = await peraWallet.signTransaction([[{ txn, signers: [connectedAddr] }]]);

    setStatus('loading', '⏳', '<span class="spinner"></span>Submitting to Algorand…');

    const { txId } = await algodClient.sendRawTransaction(signedTxns[0]).do();
    await algosdk.waitForConfirmation(algodClient, txId, 4);

    // Success!
    setStatus('success', '✅',
      `NFT sent successfully! <br><strong>Transaction ID:</strong> <code>${txId}</code><br>` +
      `Go back to Discord and click <strong>✅ I've Sent It</strong>.`
    );

    $txLink.href        = `https://allo.info/tx/${txId}`;
    $txLink.style.display = 'block';
    $btnSend.style.display = 'none';

  } catch (err) {
    $btnSend.disabled = false;

    if (err?.message?.includes('cancelled') || err?.message?.includes('rejected')) {
      setStatus('error', '❌', 'Signature cancelled. Click <strong>Sign &amp; Send NFT</strong> to try again.');
    } else if (err?.message?.includes('overspend') || err?.message?.includes('asset')) {
      setStatus('error', '❌',
        `Transaction rejected: ${err.message}<br>` +
        `Make sure you hold this NFT in your connected wallet.`
      );
    } else {
      setStatus('error', '❌', `Error: ${err.message}`);
    }
  }
});
</script>
</body>
</html>
